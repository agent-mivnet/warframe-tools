<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title>Mission Control icon</title>
  <desc>High-contrast OpenClaw mission control favicon with a stylized claw around a radar eye.</desc>
  <defs>
    <linearGradient id="bg" x1="24" y1="20" x2="232" y2="236" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="64" y1="56" x2="196" y2="196" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#bg)"/>
  <rect x="16" y="16" width="224" height="224" rx="56" fill="none" stroke="#334155" stroke-width="4"/>

  <path d="M72 86c10-22 31-37 56-37 17 0 31 5 43 15 7-15 20-25 38-29-7 19-7 36-1 52 15 5 29 16 38 31-19-4-35-1-49 9-9 35-37 59-76 59-44 0-79-35-79-79 0-7 1-14 3-21 9 3 18 3 27 0z"
        fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>

  <circle cx="128" cy="128" r="38" fill="#0b1220" stroke="#e2e8f0" stroke-width="10"/>
  <circle cx="128" cy="128" r="14" fill="#67e8f9" filter="url(#glow)"/>

  <path d="M128 82v18M174 128h-18M128 174v-18M82 128h18" stroke="#94a3b8" stroke-width="8" stroke-linecap="round"/>
  <circle cx="128" cy="128" r="58" fill="none" stroke="#1e293b" stroke-width="6" stroke-dasharray="6 12"/>
</svg>
